<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">
    0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.
</body>
<script>

    
   
//+++++++++++++++++++++++++++XHR+++++++++++++++++++++++++++++++++++//
  // XMLHttpRequest (XHR) is a built-in JavaScript object used to send and receive data from a server without reloading the webpage.
  // It allows JavaScript to communicate with a server asynchronously.


//+++++++++++++++++++++++++ Why was XMLHttpRequest introduced?++++++++++++++++++++++++++++++++++++//

//   +++++++++++++++++++++++++++Before XHR:++++++++++++++++++++++++++++++++++

//                 User clicks button
//                        ↓
//               Browser sends request
//                        ↓
//                Entire page reloads
//                        ↓
//                  New page loads

//  ++++++++++++++++++++++++++After XHR:++++++++++++++++++++++++++++++++++++++

//               User clicks button
//                       ↓
//            JavaScript sends request
//                       ↓
//              Server returns data
//                       ↓
//        Only required part of page updates

// This is called AJAX (Asynchronous JavaScript and XML).

    
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText)// JSON.parse => json string ko json object mai convert karta hai 
            console.log(typeof data);
            console.log(data.followers);
        }
    }
    xhr.send();
</script>
</html>
